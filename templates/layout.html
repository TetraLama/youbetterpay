<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

  <title>YouBetterPay! Dashboard</title>
</head>

<body>
  <h3>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('dashboard_bank') }}">Bank</a>
    <a href="{{ url_for('dashboard_account') }}">Account</a>
    <a href="{{ url_for('dashboard_transaction') }}">Transaction</a>
    <a href="{{ url_for('dashboard_transaction_type') }}">Transaction Type</a>
  </h3>

  <hr />
  {%- for category, message in get_flashed_messages(with_categories = true) %}
  <div class="alert alert-{{ category }}">
    {{ message }}
  </div>
  {% endfor %}

  {% block container %}{% endblock %}

</body>

</html>
